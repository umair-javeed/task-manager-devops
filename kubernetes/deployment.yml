apiVersion: apps/v1
kind: Deployment
metadata:
  name: task-manager-deployment
spec:
  replicas: 3
  selector:
    matchLabels:
      app: task-manager
  template:
    metadata:
      labels:
        app: task-manager
    spec:
      containers:
      - name: task-manager
        image: 495599752398.dkr.ecr.us-east-1.amazonaws.com/task-manager:latest
        ports:
        - containerPort: 3000